<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" aria-label="Finanzas — App icon">
  <defs>
    <linearGradient id="appGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="appShine" cx="0.3" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background: rounded square macOS Big Sur style (radius 22.3% of canvas) -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#appGrad)"/>
  <!-- Subtle shine overlay arriba izq (efecto de cristal) -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#appShine)"/>
  <!-- 3 barras ascendentes (chart financiero) -->
  <rect x="220" y="608" width="160" height="220" rx="36" fill="#ffffff" opacity="0.75"/>
  <rect x="432" y="448" width="160" height="380" rx="36" fill="#ffffff" opacity="0.88"/>
  <rect x="644" y="288" width="160" height="540" rx="36" fill="#ffffff"/>
  <!-- Punto indicador de growth en el tope de la barra más alta -->
  <circle cx="724" cy="232" r="60" fill="#ffffff"/>
</svg>
